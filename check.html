<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>撮影画像の確認</title>
  <style>
    body { background:#111; color:white; text-align:center; padding:40px; font-family:system-ui; }
    img { width:90%; max-width:400px; border:2px solid orange; border-radius:10px; margin-top:20px; }
  </style>
</head>
<body>
  <h1>📸 撮影画像の確認</h1>
  <div id="result">画像を取得中...</div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(
      "https://kwbxywugzrlbcalmwvjw.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Ynh5d3VnenJsYmNhbG13dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ3NjQsImV4cCI6MjA5NTQ0MDc2NH0.bGF_4lcYOLu_TGUEyUbC-c_yC4XISNfGKHZZ8YUVdnY"
    );

    const id = new URLSearchParams(window.location.search).get("id");
    const result = document.getElementById("result");

    if (!id) {
      result.textContent = "IDが指定されていません。";
    } else {
      const { data, error } = await supabase.storage
        .from("photos")
        .createSignedUrl(`${id}.jpg`, 86400);

      if (error || !data?.signedUrl) {
        result.textContent = "画像が見つかりません。";
      } else {
        result.innerHTML = `<img src="${data.signedUrl}" alt="撮影画像">`;
      }
    }
  </script>
</body>
</html>
